name: Run tests
on:
  workflow_call:
  workflow_dispatch:

permissions:
    contents: read

jobs:
  run-host-validation-tests:
    runs-on: ubuntu-latest
    services:
      flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:v3.5.0
        ports:
        - 8191:8191
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install package
        run: pip install -e .

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest 
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest tests/ -v -m "host_validation"
